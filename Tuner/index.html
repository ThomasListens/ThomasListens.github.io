<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JI Pitch Ruler</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      background: #000;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      color: #fff;
    }
    
    #app {
      display: flex;
      height: 100vh;
      height: 100dvh;
    }
    
    #controls {
      width: 320px;
      padding: 20px;
      background: #0a0a0a;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    
    #controls.hidden {
      display: none;
    }
    
    #controls h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
      cursor: default;
      user-select: none;
    }
    
    #controls h1:hover {
      opacity: 0.9;
    }
    
    .control-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .section-header {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #666;
      font-weight: 500;
      margin-bottom: 2px;
    }
    
    #controls label {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 6px;
    }
    
    #controls input[type="number"],
    #controls select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #111;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
    }
    
    #controls input[type="number"]:focus,
    #controls select:focus {
      outline: none;
      border-color: #555;
    }
    
    #controls textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #111;
      color: #fff;
      font-size: 14px;
      font-family: 'SF Mono', 'Consolas', monospace;
      resize: none;
      min-height: 180px;
      line-height: 1.6;
    }
    
    #controls textarea:focus {
      outline: none;
      border-color: #555;
    }
    
    #micBtn {
      padding: 16px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      background: #fff;
      color: #000;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    #micBtn:hover {
      background: #e5e5e5;
    }
    
    #micBtn.listening {
      background: #ff4444;
      color: #fff;
    }
    
    #micBtn.listening::before {
      content: '';
      width: 8px;
      height: 8px;
      background: #fff;
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.1); }
    }
    
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 4px 0;
    }
    
    .checkbox-row input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #ff4444;
      flex-shrink: 0;
    }
    
    .checkbox-row label {
      margin: 0;
      font-size: 14px;
      color: #ccc;
      cursor: pointer;
    }
    
    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .slider-row input[type="range"] {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      background: #333;
      border-radius: 2px;
      outline: none;
    }
    
    .slider-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
    }
    
    .slider-row span {
      min-width: 40px;
      font-size: 13px;
      color: #888;
      text-align: right;
    }
    
    #rulerContainer {
      flex: 1;
      position: relative;
      background: #000;
    }
    
    #rulerCanvas {
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    
    .button-row {
      display: flex;
      gap: 10px;
    }
    
    .button-row button {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a1a;
      color: #888;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .button-row button:hover {
      background: #222;
      color: #fff;
      border-color: #444;
    }
    
    #stopDronesBtn {
      width: 100%;
      padding: 12px;
      background: #2a1515;
      color: #ff6666;
      border: 1px solid #552222;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      display: none;
    }
    
    #stopDronesBtn.visible {
      display: block;
    }
    
    .advanced {
      display: none;
    }
    
    .advanced.visible {
      display: block;
    }
    
    /* Remove this entire block to delete the "Show advanced features" toggle */
    #advancedToggle {
      font-size: 12px;
      color: #555;
      text-align: center;
      padding: 8px;
      cursor: pointer;
      user-select: none;
    }
    
    #advancedToggle:hover {
      color: #777;
    }
    /* End remove block */
    
    .credit {
      margin-top: auto;
      padding-top: 16px;
      text-align: center;
    }
    
    .credit a {
      color: #ff4444;
      text-decoration: none;
      font-size: 16px;  /* Increased from 13px */
      font-weight: 500;
      opacity: 0.9;
      transition: opacity 0.2s;
    }
    
    .credit a:hover {
      opacity: 1;
    }
    
    #mobileToggle {
      display: none;
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 1000;
      padding: 12px 16px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #fff;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }
    
    @media (max-width: 768px) {
      #app {
        flex-direction: column;
      }
      
      #controls {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 85%;
        max-height: 600px;
        z-index: 100;
        transform: translateY(-100%);
        transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        border-right: none;
        border-bottom: 1px solid #333;
        padding: 16px;
        padding-top: 60px;
      }
      
      #controls.mobile-open {
        transform: translateY(0);
      }
      
      #controls.hidden {
        display: none;
      }
      
      #mobileToggle {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      
      #rulerContainer {
        height: 100vh;
        height: 100dvh;
        width: 100%;
      }
    }
    
    .obs #mobileToggle,
    .obs #controls {
      display: none !important;
    }

    #cameraFeed {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      left: -9999px;
    }

    #recordOverlay {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 200;
      padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0));
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    body.record-mode #recordOverlay {
      display: flex;
    }

    #recordOverlay > * {
      pointer-events: auto;
    }

    #recordOverlay .record-row {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
    }

    #recordOverlay button.icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid #444;
      background: rgba(20, 20, 20, 0.8);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    #recordOverlay button.icon:active {
      background: rgba(40, 40, 40, 0.9);
    }

    #recBtn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 4px solid #fff;
      background: #ff3b30;
      cursor: pointer;
      padding: 0;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    #recBtn:active {
      transform: scale(0.92);
    }

    #recBtn.recording {
      border-radius: 14px;
      width: 32px;
      height: 32px;
      border-width: 0;
      margin: 20px;
    }

    #recordOverlay .feather-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 8px;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }

    #recordOverlay .feather-row label {
      font-size: 11px;
      color: #aaa;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    #recordOverlay input[type="range"] {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      outline: none;
    }

    #recordOverlay input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
    }

    #recIndicator {
      position: fixed;
      top: calc(14px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 201;
      padding: 6px 14px 6px 28px;
      background: rgba(0,0,0,0.7);
      border-radius: 20px;
      color: #fff;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      display: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    #recIndicator::before {
      content: '';
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 8px;
      background: #ff3b30;
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }

    #recIndicator.visible {
      display: block;
    }

    body.record-mode #controls,
    body.record-mode #mobileToggle {
      display: none !important;
    }

    body.record-mode #app {
      flex-direction: column;
    }

    body.record-mode #rulerContainer {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    body.record-mode #rulerCanvas {
      aspect-ratio: 9 / 16;
      height: 100%;
      width: auto;
      max-width: 100%;
      max-height: 100%;
    }

    @media (orientation: portrait) {
      body.record-mode #rulerCanvas {
        width: 100%;
        height: auto;
      }
    }
  </style>
</head>

  <div id="app">
    <div id="controls">
      <h1 id="title">JI Pitch Ruler</h1>
      
      <button id="micBtn">Microphone</button>
      
      <div class="control-section">

            <option value="174.61|F3">F3</option>

            <option value="196.00|G3">G3</option>
            <option value="207.65|G♯3">G♯3</option>
            <option value="220.00|A3">A3</option>
            <option value="233.08|A♯3">A♯3</option>
            <option value="246.94|B3">B3</option>
            <option value="261.63|C4">C4</option>
            <option value="277.18|C♯4">C♯4</option>

            <option value="392.00|G4">G4</option>

            <option value="466.16|A♯4">A♯4</option>
            <option value="493.88|B4">B4</option>
            <option value="523.25|C5">C5</option>
            <option value="554.37|C♯5">C♯5</option>
            <option value="587.33|D5">D5</option>
            <option value="622.25|D♯5">D♯5</option>
            <option value="659.25|E5">E5</option>
            <option value="698.46|F5">F5</option>
            <option value="739.99|F♯5">F♯5</option>

          </select>
        </div>
      </div>
      
      <div class="control-section">
        <div class="section-header">Ratios</div>
        <textarea id="ratios" placeholder="Enter ratios...">1/1
8/7
5/4
4/3
11/8
16/11
3/2
8/5
7/4
2/1</textarea>
        <div class="button-row">
          <button id="saveBtn">Save Session</button>
          <button id="resetBtn">Reset</button>
        </div>
      </div>
      
      <div class="control-section">
        <div class="section-header">Display</div>
        <div class="checkbox-row">
          <input type="checkbox" id="showCents" checked>

        <div class="checkbox-row">
          <input type="checkbox" id="octaveWrap" checked>
          <label for="octaveWrap">Wrap to octave</label>

        <div class="checkbox-row">
          <input type="checkbox" id="show12EDO" checked>
          <label for="show12EDO">Show 12-EDO reference</label>

        <div id="edoSettings" style="display: none; margin-top: 8px; padding-left: 8px;">
          <label>Label position</label>

            <input type="range" id="edoOffset" min="0" max="100" value="15">
            <span id="edoOffsetVal">15%</span>

        </div>
      </div>
      
      <div class="control-section">
        <div class="section-header">Tracking</div>

            <div class="button-row">
              <button id="playPauseBtn">Play</button>

            </div>
            <input type="range" id="seekBar" min="0" max="100" value="0" step="0.1" style="width: 100%; margin-top: 8px;">
          </div>
        </div>
      </div>
      
      <div class="credit">
        <a href="https://ThomasListens.github.io" target="_blank" rel="noopener">Thomas LeRoy Meier</a>
      </div>
    </div>
    
    <div id="rulerContainer">
      <canvas id="rulerCanvas"></canvas>
    </div>
  </div>

  <video id="cameraFeed" autoplay playsinline muted></video>

  <div id="recIndicator"><span id="recTime">0:00</span></div>

  <div id="recordOverlay">
    <div class="feather-row">
      <label>Backdrop</label>
      <input type="range" id="featherSlider" min="0" max="100" value="55">
    </div>
    <div class="record-row">
      <button class="icon" id="flipCamBtn" title="Flip camera">⟳</button>
      <button id="recBtn" title="Record"></button>
      <button class="icon" id="exitRecBtn" title="Exit record mode">✕</button>
    </div>
  </div>

  <script>
    const DEFAULTS = {
      refFreq: 130.81,
      refNote: 'C3',
      ratios: '1/1\n8/7\n5/4\n4/3\n11/8\n16/11\n3/2\n8/5\n7/4\n2/1',
      showCents: true,
      showHz: false,
      showGhost: true,
      show12EDO: true,
      edoOffset: 0.15,
      rulerX: 0.75,
      smoothing: 8,
      responsiveness: 6,
      octaveWrap: true,
      showIndicatorHz: true,
      showIndicatorDeviation: true,
      showIndicatorRatio: true
    };
    
    const config = { ...DEFAULTS, ratios: [] };
    
    let audioContext = null, analyser = null, isListening = false;
    let smoothedFreq = null, smoothedCents = null, currentProbability = 0;
    let ghostTrail = [], animationId = null, lastGhostTime = 0;
    let lastPitchTime = 0, lastValidPitch = null, lastDetectTime = 0;
    let ratioExtensions = {}, lastNearestLabel = null;
    let indicatorY = null, indicatorOpacity = 0;
    let lastDisplayCents = null, lastDisplayFreq = null, smoothedProximity = 0;
    let droneOscillators = {}, droneRatioYPositions = {};
    let droneAudioCtx = null, droneMasterGain = null, droneDCBlock = null, droneLimiter = null;
    let audioBuffer = null, sourceNode = null, isPlaying = false;
    let startTime = 0, pauseTime = 0, fileMode = false;
    let advancedVisible = false;
    let fileUploadUnlocked = false;

    let recordMode = false;
    let cameraStream = null;
    let cameraFacing = 'user';
    let currentAudioStream = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let recordStartTime = 0;
    let recordTimerId = null;
    let featherAmount = 0.55;
    
    const noteNames = ['C', 'C♯', 'D', 'D♯', 'E', 'F', 'F♯', 'G', 'G♯', 'A', 'A♯', 'B'];
    const noteNamesFlat = ['C', 'D♭', 'D', 'E♭', 'E', 'F', 'G♭', 'G', 'A♭', 'A', 'B♭', 'B'];
    
    function parseNoteName(noteName) {
      const match = noteName.match(/^([A-Ga-g][#♯b♭]?)(\d+)?$/);
      if (!match) return { note: 'C', octave: 3, index: 0 };
      
      const note = match[1].charAt(0).toUpperCase() + match[1].slice(1);
      const octave = match[2] ? parseInt(match[2]) : 3;
      
      const noteMap = {
        'C': 0, 'C#': 1, 'C♯': 1, 'Db': 1, 'D♭': 1,
        'D': 2, 'D#': 3, 'D♯': 3, 'Eb': 3, 'E♭': 3,
        'E': 4,
        'F': 5, 'F#': 6, 'F♯': 6, 'Gb': 6, 'G♭': 6,
        'G': 7, 'G#': 8, 'G♯': 8, 'Ab': 8, 'A♭': 8,
        'A': 9, 'A#': 10, 'A♯': 10, 'Bb': 10, 'B♭': 10,
        'B': 11
      };
      
      return { note, octave, index: noteMap[note] ?? 0 };
    }
    
    function getNoteAtCents(cents, refNoteName) {
      const ref = parseNoteName(refNoteName);
      const semitones = Math.round(cents / 100);
      const totalSemitones = ref.index + semitones;
      const noteIndex = ((totalSemitones % 12) + 12) % 12;
      const octaveOffset = Math.floor(totalSemitones / 12);
      const octave = ref.octave + octaveOffset;
      
      const useFlats = refNoteName.includes('b') || refNoteName.includes('♭');
      const names = useFlats ? noteNamesFlat : noteNames;
      
      return { name: names[noteIndex], octave };
    }
    
    const primeHues = { 2: 0, 3: 35, 5: 170, 7: 280, 11: 55, 13: 320, 17: 200, 19: 100 };
    
    function getPrimeFactors(n) {
      const factors = {};
      let num = Math.abs(n);
      for (let p = 2; p * p <= num; p++) {
        while (num % p === 0) {
          factors[p] = (factors[p] || 0) + 1;
          num /= p;
        }
      }
      if (num > 1) factors[num] = (factors[num] || 0) + 1;
      return factors;
    }
    
    function getColorForRatio(ratio) {
      const label = ratio.label;
      let num = 1, den = 1;
      if (label.includes('/')) {
        [num, den] = label.split('/').map(Number);
      }
      
      const numFactors = getPrimeFactors(num);
      const denFactors = getPrimeFactors(den);
      const allFactors = { ...numFactors };
      for (const [p, count] of Object.entries(denFactors)) {
        allFactors[p] = (allFactors[p] || 0) - count;
      }
      
      delete allFactors[2];
      
      if (Object.keys(allFactors).length === 0) {
        return { h: 0, s: 0, l: 95, type: 'neutral' };
      }
      
      let harmonicWeight = 0, subharmonicWeight = 0, totalWeight = 0;
      let hueSum = 0, maxPrime = 2;
      
      for (const [p, count] of Object.entries(allFactors)) {
        const prime = parseInt(p);
        const weight = Math.abs(count);
        const hue = primeHues[prime] || (prime * 37) % 360;
        hueSum += hue * weight;
        totalWeight += weight;
        if (prime > maxPrime) maxPrime = prime;
        if (count > 0) harmonicWeight += weight;
        else subharmonicWeight += weight;
      }
      
      const avgHue = totalWeight > 0 ? hueSum / totalWeight : 0;
      const complexity = Math.log2(maxPrime);
      const isHarmonic = harmonicWeight > subharmonicWeight;
      const isMixed = harmonicWeight > 0 && subharmonicWeight > 0;
      
      let hue, saturation, lightness;
      if (isHarmonic) {
        hue = (avgHue - 10 + 360) % 360;
        saturation = Math.max(50, 85 - complexity * 6);
        lightness = 72;
      } else {
        hue = (avgHue + 15) % 360;
        saturation = Math.max(35, 65 - complexity * 6);
        lightness = 62;
      }
      
      if (isMixed) {
        saturation = Math.max(40, saturation - 10);
        lightness = 67;
      }
      
      return { h: hue, s: saturation, l: lightness, type: isHarmonic ? 'harmonic' : 'subharmonic', mixed: isMixed };
    }
    
    function hslToString(hsl, alpha = 1) {
      return `hsla(${hsl.h}, ${hsl.s}%, ${hsl.l}%, ${alpha})`;
    }
    
    function yinDetect(buffer, sampleRate) {
      const threshold = 0.15;
      const bufferSize = buffer.length;
      const halfBuffer = Math.floor(bufferSize / 2);
      
      let rms = 0;
      for (let i = 0; i < bufferSize; i++) rms += buffer[i] * buffer[i];
      rms = Math.sqrt(rms / bufferSize);
      if (rms < 0.005) return { freq: -1, probability: 0 };
      
      const yinBuffer = new Float32Array(halfBuffer);
      let runningSum = 0;
      yinBuffer[0] = 1;
      
      for (let tau = 1; tau < halfBuffer; tau++) {
        let diff = 0;
        for (let i = 0; i < halfBuffer; i++) {
          const delta = buffer[i] - buffer[i + tau];
          diff += delta * delta;
        }
        yinBuffer[tau] = diff;
        runningSum += diff;
        yinBuffer[tau] = yinBuffer[tau] * tau / runningSum;
      }
      
      let tauEstimate = -1, minVal = 1, foundBelow = false;
      let candidates = [];
      
      for (let tau = 2; tau < halfBuffer; tau++) {
        if (yinBuffer[tau] < threshold) {
          foundBelow = true;
          candidates.push({ tau, val: yinBuffer[tau] });
          if (yinBuffer[tau] < minVal) {
            minVal = yinBuffer[tau];
            tauEstimate = tau;
          }
        } else if (foundBelow && yinBuffer[tau] > threshold * 2) break;
      }
      
      if (candidates.length > 1 && tauEstimate > 0) {
        for (const cand of candidates) {
          const ratio = cand.tau / tauEstimate;
          if (ratio > 1.9 && ratio < 2.1 && cand.val < minVal * 1.5) {
            tauEstimate = cand.tau;
            minVal = cand.val;
            break;
          }
        }
      }
      
      if (tauEstimate === -1) {
        minVal = yinBuffer[2];
        tauEstimate = 2;
        for (let tau = 3; tau < halfBuffer; tau++) {
          if (yinBuffer[tau] < minVal) {
            minVal = yinBuffer[tau];
            tauEstimate = tau;
          }
        }
        if (minVal > 0.5) return { freq: -1, probability: 0 };
      }
      
      let betterTau = tauEstimate;
      if (tauEstimate > 0 && tauEstimate < halfBuffer - 1) {
        const s0 = yinBuffer[tauEstimate - 1];
        const s1 = yinBuffer[tauEstimate];
        const s2 = yinBuffer[tauEstimate + 1];
        const denom = 2 * (2 * s1 - s2 - s0);
        if (Math.abs(denom) > 0.0001) {
          const adjustment = (s2 - s0) / denom;
          if (Math.abs(adjustment) < 1) betterTau = tauEstimate + adjustment;
        }
      }
      
      return { freq: sampleRate / betterTau, probability: 1 - minVal };
    }
    
    const semitoneLabels = ['P1', 'm2', 'M2', 'm3', 'M3', 'P4', 'TT', 'P5', 'm6', 'M6', 'm7', 'M7', 'P8'];
    
    function parseRatios(text) {
      const parts = text.trim().split(/[\s,\n]+/);
      const ratios = [];
      
      for (const part of parts) {
        if (!part) continue;
        
        if (part.includes('/')) {
          const [num, den] = part.split('/').map(Number);
          if (!isNaN(num) && !isNaN(den) && den !== 0) {
            const ratio = num / den;
            ratios.push({
              ratio: ratio,
              label: part,
              cents: 1200 * Math.log2(ratio),
              color: getColorForRatio({ label: part }),
              type: 'ji'
            });
          }
        } else if (part.toLowerCase().endsWith('c')) {
          const cents = parseFloat(part);
          if (!isNaN(cents)) {
            ratios.push({
              ratio: Math.pow(2, cents / 1200),
              label: part,
              cents: cents,
              color: { h: 0, s: 0, l: 70 },
              type: 'cents'
            });
          }
        } else {
          const val = parseFloat(part);
          if (!isNaN(val) && Number.isInteger(val) && val >= 0 && val <= 24 && !part.includes('.')) {
            const cents = val * 100;
            const semitoneIndex = val % 12;
            const octave = Math.floor(val / 12);
            let label = semitoneLabels[semitoneIndex] || `${val}`;
            if (octave > 0 && semitoneIndex !== 0) label = semitoneLabels[semitoneIndex];
            
            ratios.push({
              ratio: Math.pow(2, cents / 1200),
              label: label,
              cents: cents,
              color: { h: 0, s: 0, l: 55 },
              type: 'edo'
            });
          } else if (!isNaN(val) && val > 0) {
            ratios.push({
              ratio: val,
              label: val.toFixed(3),
              cents: 1200 * Math.log2(val),
              color: { h: 0, s: 0, l: 70 },
              type: 'decimal'
            });
          }
        }
      }
      
      ratios.sort((a, b) => a.cents - b.cents);
      return ratios;
    }
    
    function initDroneAudio() {
      if (droneAudioCtx) return;
      
      droneAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      droneMasterGain = droneAudioCtx.createGain();
      droneMasterGain.gain.value = 0.3;
      
      droneDCBlock = droneAudioCtx.createBiquadFilter();
      droneDCBlock.type = 'highpass';
      droneDCBlock.frequency.value = 10;
      droneDCBlock.Q.value = 0.7;
      
      droneLimiter = droneAudioCtx.createDynamicsCompressor();
      droneLimiter.threshold.value = -6;
      droneLimiter.ratio.value = 20;
      droneLimiter.attack.value = 0.003;
      droneLimiter.release.value = 0.05;
      
      droneDCBlock.connect(droneLimiter);
      droneLimiter.connect(droneMasterGain);
      droneMasterGain.connect(droneAudioCtx.destination);
    }
    
    function toggleDrone(ratio) {
      const label = ratio.label;
      const freq = config.refFreq * ratio.ratio;
      
      if (droneOscillators[label]) {
        stopDrone(label);
        updateStopButton();
        return;
      }
      
      initDroneAudio();
      if (droneAudioCtx.state === 'suspended') droneAudioCtx.resume();
      
      const now = droneAudioCtx.currentTime;
      const osc = droneAudioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now);
      
      const gain = droneAudioCtx.createGain();
      gain.gain.setValueAtTime(0, now);
      
      osc.connect(gain);
      gain.connect(droneDCBlock);
      
      const startDelay = 0.01;
      osc.start(now + startDelay);
      gain.gain.setValueAtTime(0, now + startDelay);
      gain.gain.linearRampToValueAtTime(0.12, now + startDelay + 0.02);
      
      droneOscillators[label] = { osc, gain, freq };
      updateStopButton();
      draw();
    }
    
    function updateStopButton() {
      const btn = document.getElementById('stopDronesBtn');
      const hasDrones = Object.keys(droneOscillators).length > 0;
      btn.classList.toggle('visible', hasDrones);
    }
    
    function stopDrone(label) {
      if (!droneOscillators[label]) return;
      
      const { osc, gain } = droneOscillators[label];
      const now = droneAudioCtx.currentTime;
      
      gain.gain.cancelScheduledValues(now);
      gain.gain.setValueAtTime(gain.gain.value, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.02);
      
      setTimeout(() => {
        try {
          osc.stop();
          osc.disconnect();
          gain.disconnect();
        } catch(e) {}
      }, 50);
      
      delete droneOscillators[label];
      draw();
    }
    
    function stopAllDrones() {
      Object.keys(droneOscillators).forEach(stopDrone);
      updateStopButton();
    }
    
    function handleCanvasClick(event) {
      const canvas = document.getElementById('rulerCanvas');
      const rect = canvas.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      
      const rulerX = rect.width * config.rulerX;
      if (x > rulerX + 50) return;
      
      for (const ratio of config.ratios) {
        const ratioY = droneRatioYPositions[ratio.label];
        if (ratioY !== undefined && Math.abs(y - ratioY) < 20) {
          toggleDrone(ratio);
          return;
        }
      }
    }
    
    function drawCameraBackground(ctx, W, H) {
      const video = document.getElementById('cameraFeed');
      if (!video || video.readyState < 2) {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, W, H);
        return;
      }
      const vw = video.videoWidth, vh = video.videoHeight;
      if (!vw || !vh) {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, W, H);
        return;
      }
      const scale = Math.max(W / vw, H / vh);
      const drawW = vw * scale, drawH = vh * scale;
      const dx = (W - drawW) / 2, dy = (H - drawH) / 2;
      if (cameraFacing === 'user') {
        ctx.save();
        ctx.translate(W, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, W - dx - drawW, dy, drawW, drawH);
        ctx.restore();
      } else {
        ctx.drawImage(video, dx, dy, drawW, drawH);
      }
    }

    function drawRulerBackdrop(ctx, W, H) {
      if (featherAmount <= 0) return;
      const rulerX = W * config.rulerX;
      const fadeWidth = Math.max(80, W * 0.35);
      const startX = Math.max(0, rulerX - fadeWidth);
      const grad = ctx.createLinearGradient(startX, 0, W, 0);
      grad.addColorStop(0, 'rgba(0,0,0,0)');
      grad.addColorStop(1, `rgba(0,0,0,${featherAmount})`);
      ctx.fillStyle = grad;
      ctx.fillRect(startX, 0, W - startX, H);
    }

    function draw() {
      const canvas = document.getElementById('rulerCanvas');
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;

      let W, H;

      if (recordMode) {
        W = 1080;
        H = 1920;
        if (canvas.width !== W || canvas.height !== H) {
          canvas.width = W;
          canvas.height = H;
          canvas.style.width = '';
          canvas.style.height = '';
        }
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        drawCameraBackground(ctx, W, H);
        drawRulerBackdrop(ctx, W, H);
      } else {
        const rect = canvas.parentElement.getBoundingClientRect();
        const targetWidth = rect.width * dpr;
        const targetHeight = rect.height * dpr;

        if (canvas.width !== targetWidth || canvas.height !== targetHeight) {
          canvas.width = targetWidth;
          canvas.height = targetHeight;
          canvas.style.width = rect.width + 'px';
          canvas.style.height = rect.height + 'px';
        }

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        W = rect.width;
        H = rect.height;
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, W, H);
      }

      if (config.ratios.length === 0) return;
      
      const minCents = config.ratios[0].cents;
      const maxCents = config.ratios[config.ratios.length - 1].cents;
      const centsRange = maxCents - minCents;
      
      const paddingCents = centsRange * 0.08;
      const displayMin = minCents - paddingCents;
      const displayMax = maxCents + paddingCents;
      
      const padding = 60;
      const rulerTop = padding;
      const rulerBottom = H - padding;
      const rulerHeight = rulerBottom - rulerTop;
      const rulerX = W * config.rulerX;
      
      function centsToY(cents) {
        const normalized = (cents - displayMin) / (displayMax - displayMin);
        return rulerBottom - normalized * rulerHeight;
      }
      
      let displayCents = null, displayFreq = null, displayProbability = 0, isActive = false;
      
      const now = performance.now();
      const timeSinceLastPitch = now - lastPitchTime;
      
      if (smoothedCents !== null && timeSinceLastPitch < 200) {
        displayCents = smoothedCents;
        displayFreq = smoothedFreq;
        displayProbability = currentProbability;
        isActive = true;
        lastDisplayCents = smoothedCents;
        lastDisplayFreq = smoothedFreq;
      } else if (lastDisplayCents !== null) {
        displayCents = lastDisplayCents;
        displayFreq = lastDisplayFreq;
        const fadeTime = 500;
        displayProbability = timeSinceLastPitch < fadeTime ? Math.max(0, 1 - (timeSinceLastPitch / fadeTime)) : 0;
      }
      
      const targetOpacity = isActive ? Math.min(1, currentProbability * 1.2) : displayProbability * 0.5;
      indicatorOpacity += (targetOpacity - indicatorOpacity) * 0.2;
      
      let wrappedCents = displayCents;
      if (config.octaveWrap && displayCents !== null && config.ratios.length >= 2) {
        const minCents = config.ratios[0].cents;
        const maxCents = config.ratios[config.ratios.length - 1].cents;
        while (wrappedCents < minCents - 50) wrappedCents += 1200;
        while (wrappedCents > maxCents + 50) wrappedCents -= 1200;
      }
      
      let nearestRatio = null, nearestDiff = Infinity;
      
      if (wrappedCents !== null) {
        for (const ratio of config.ratios) {
          const diff = Math.abs(ratio.cents - wrappedCents);
          if (diff < nearestDiff) {
            nearestDiff = diff;
            nearestRatio = ratio;
          }
        }
      }
      
      displayCents = wrappedCents;
      
      if (config.show12EDO) {
        const startSemitone = Math.floor(displayMin / 100);
        const endSemitone = Math.ceil(displayMax / 100);
        const isCustomMode = !document.getElementById('refPreset').value;
        const edoLabelX = rulerX - 95 - (config.edoOffset * 100);
        
        ctx.setLineDash([4, 6]);
        
        for (let semi = startSemitone; semi <= endSemitone; semi++) {
          const cents = semi * 100;
          if (cents < displayMin || cents > displayMax) continue;
          
          const y = centsToY(cents);
          ctx.strokeStyle = 'rgba(70, 70, 70, 0.7)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(W, y);
          ctx.stroke();
          
          ctx.fillStyle = 'rgba(100, 100, 100, 1)';
          ctx.font = '11px system-ui';
          ctx.textAlign = 'right';
          ctx.textBaseline = 'middle';
          
          let label;
          if (isCustomMode) {
            const degree = ((semi % 12) + 12) % 12;
            const degreeNames = ['1', '♭2', '2', '♭3', '3', '4', '♯4', '5', '♭6', '6', '♭7', '7'];
            label = degreeNames[degree];
          } else {
            const noteInfo = getNoteAtCents(cents, config.refNote);
            label = `${noteInfo.name}${noteInfo.octave}`;
          }
          
          ctx.fillText(label, edoLabelX, y);
        }
        
        ctx.setLineDash([]);
      }
      
      for (const ratio of config.ratios) {
        const y = centsToY(ratio.cents);
        const isNearest = (nearestRatio === ratio && nearestDiff < 25);
        const isDroneActive = droneOscillators[ratio.label] !== undefined;
        
        droneRatioYPositions[ratio.label] = y;
        
        if (ratioExtensions[ratio.label] === undefined) ratioExtensions[ratio.label] = 0;
        
        const targetExtension = isNearest ? 1 : 0;
        const extensionSpeed = 0.15;
        ratioExtensions[ratio.label] += (targetExtension - ratioExtensions[ratio.label]) * extensionSpeed;
        const ext = ratioExtensions[ratio.label];
        
        const color = ratio.color;
        const droneBoost = isDroneActive ? 0.12 : 0;
        const alpha = 0.85 + ext * 0.15 + droneBoost;
        const colorStr = hslToString(color, alpha);
        
        const lineLeft = rulerX - 50 - (ext * 30);
        const lineRight = rulerX + 25;
        const lineWidth = 1.5 + ext * 1.5;
        
        ctx.strokeStyle = colorStr;
        ctx.lineWidth = lineWidth;
        ctx.beginPath();
        ctx.moveTo(lineLeft, y);
        ctx.lineTo(lineRight, y);
        ctx.stroke();
        
        const fontSize = 15 + ext * 3;
        const fontWeight = ext > 0.5 ? 'bold' : 'normal';
        
        ctx.fillStyle = colorStr;
        ctx.font = `${fontWeight} ${fontSize}px system-ui`;
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        ctx.fillText(ratio.label, lineLeft - 12, y);
        
        // FIXED positioning: Hz and cents with proper spacing to avoid collision
        const hzX = rulerX + 38;
        const centsX = config.showHz ? rulerX + 85 : rulerX + 55;
        
        if (config.showHz) {
          const hz = config.refFreq * ratio.ratio;
          ctx.font = '11px system-ui';
          ctx.textAlign = 'left';
          const hzAlpha = 0.35 + ext * 0.55 + droneBoost;
          ctx.fillStyle = hslToString(color, hzAlpha);
          ctx.fillText(`${hz.toFixed(1)}`, hzX, y);
        }
        
        if (config.showCents) {
          ctx.font = '10px system-ui';
          ctx.fillStyle = 'rgba(255,255,255,0.25)';
          ctx.textAlign = 'left';
          ctx.fillText(`${ratio.cents.toFixed(0)}¢`, centsX, y);
        }
      }
      
      if (config.showGhost && ghostTrail.length > 0) {
        for (let i = 0; i < ghostTrail.length; i++) {
          const ghost = ghostTrail[i];
          const age = ghostTrail.length - i;
          const alpha = Math.pow(1 - age / 20, 1.5) * 0.5;
          const size = 10 - age * 0.3;
          
          if (ghost.cents >= displayMin && ghost.cents <= displayMax && size > 2) {
            const y = centsToY(ghost.cents);
            
            ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.4})`;
            ctx.beginPath();
            ctx.arc(rulerX, y, size + 3, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
            ctx.beginPath();
            ctx.arc(rulerX, y, size / 2, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }
      
      if (displayCents !== null && displayFreq !== null && indicatorOpacity > 0.02) {
        const targetY = centsToY(displayCents);
        
        if (indicatorY === null) indicatorY = targetY;
        else indicatorY += (targetY - indicatorY) * 0.25;
        
        const y = indicatorY;
        
        if (isActive && now - lastGhostTime > 40 && displayProbability > 0.3) {
          ghostTrail.push({ cents: displayCents, time: now });
          if (ghostTrail.length > 20) ghostTrail.shift();
          lastGhostTime = now;
        }
        
        const alpha = indicatorOpacity;
        const targetProximity = (nearestRatio && isActive) ? Math.max(0, 1 - nearestDiff / 50) : 0;
        smoothedProximity += (targetProximity - smoothedProximity) * 0.12;
        const prox = smoothedProximity;
        
        const isLockedOn = prox > 0.75 && isActive;
        
        const baseSize = 16;
        const bracketSize = baseSize - (prox * 5);
        const bracketLength = 6 + (prox * 3);
        const bracketThickness = 1.5 + (prox * 0.5);
        const armLength = 25 + (prox * 15);
        
        let crosshairColor;
        if (!isActive) {
          crosshairColor = `rgba(100, 100, 100, ${alpha * 0.7})`;
        } else {
          const r = Math.round(255 - (51 * prox));
          const g = Math.round(255 - (187 * prox));
          const b = Math.round(255 - (187 * prox));
          crosshairColor = `rgba(${r}, ${g}, ${b}, ${alpha * (0.9 + prox * 0.1)})`;
        }
        
        ctx.strokeStyle = crosshairColor;
        ctx.lineWidth = bracketThickness;
        ctx.lineCap = 'square';
        
        ctx.beginPath();
        ctx.moveTo(rulerX - bracketSize, y - bracketSize + bracketLength);
        ctx.lineTo(rulerX - bracketSize, y - bracketSize);
        ctx.lineTo(rulerX - bracketSize + bracketLength, y - bracketSize);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(rulerX + bracketSize - bracketLength, y - bracketSize);
        ctx.lineTo(rulerX + bracketSize, y - bracketSize);
        ctx.lineTo(rulerX + bracketSize, y - bracketSize + bracketLength);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(rulerX - bracketSize, y + bracketSize - bracketLength);
        ctx.lineTo(rulerX - bracketSize, y + bracketSize);
        ctx.lineTo(rulerX - bracketSize + bracketLength, y + bracketSize);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(rulerX + bracketSize - bracketLength, y + bracketSize);
        ctx.lineTo(rulerX + bracketSize, y + bracketSize);
        ctx.lineTo(rulerX + bracketSize, y + bracketSize - bracketLength);
        ctx.stroke();
        
        ctx.lineWidth = 1 + (prox * 1);
        ctx.beginPath();
        ctx.moveTo(rulerX - bracketSize - 6, y);
        ctx.lineTo(rulerX - bracketSize - 6 - armLength, y);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(rulerX + bracketSize + 6, y);
        ctx.lineTo(rulerX + bracketSize + 6 + armLength, y);
        ctx.stroke();
        
        const dotSize = 2 + (prox * 1);
        ctx.fillStyle = crosshairColor;
        ctx.beginPath();
        ctx.arc(rulerX, y, dotSize, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.lineWidth = 1;
        const tickAlpha = isActive ? alpha * (0.3 + prox * 0.2) : alpha * 0.2;
        ctx.strokeStyle = isActive ? `rgba(255, 255, 255, ${tickAlpha})` : `rgba(100, 100, 100, ${tickAlpha})`;
        
        for (let i = 1; i <= 2; i++) {
          const tickX = bracketSize + 6 + (armLength / 3) * i;
          ctx.beginPath();
          ctx.moveTo(rulerX - tickX, y - 2);
          ctx.lineTo(rulerX - tickX, y + 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(rulerX + tickX, y - 2);
          ctx.lineTo(rulerX + tickX, y + 2);
          ctx.stroke();
        }
        
        if (config.showIndicatorHz) {
          ctx.fillStyle = isActive ? `rgba(255, 255, 255, ${alpha})` : `rgba(100, 100, 100, ${alpha * 0.7})`;
          ctx.font = 'bold 22px system-ui';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          ctx.fillText(`${displayFreq.toFixed(1)} Hz`, rulerX, y - bracketSize - 6);
        }
        
        if (nearestRatio && nearestDiff < 50 && (config.showIndicatorDeviation || config.showIndicatorRatio)) {
          const deviation = displayCents - nearestRatio.cents;
          const sign = deviation >= 0 ? '+' : '';
          
          ctx.font = '12px system-ui';
          if (!isActive) {
            ctx.fillStyle = `rgba(100, 100, 100, ${alpha * 0.7})`;
          } else {
            const ratioColor = nearestRatio.color;
            const baseH = ratioColor.h;
            const blendedH = baseH + (0 - baseH) * prox * 0.8;
            const blendedS = ratioColor.s + (80 - ratioColor.s) * prox;
            const blendedL = ratioColor.l + (50 - ratioColor.l) * prox * 0.5;
            ctx.fillStyle = `hsla(${blendedH}, ${blendedS}%, ${blendedL}%, ${alpha * 0.85})`;
          }
          ctx.textBaseline = 'top';
          
          let infoText = '';
          if (config.showIndicatorRatio && config.showIndicatorDeviation) {
            infoText = `${nearestRatio.label}  ${sign}${deviation.toFixed(1)}¢`;
          } else if (config.showIndicatorRatio) {
            infoText = nearestRatio.label;
          } else {
            infoText = `${sign}${deviation.toFixed(1)}¢`;
          }
          
          ctx.fillText(infoText, rulerX, y + bracketSize + 8);
        }
      }
    }
    
    function audioLoop() {
      if (!analyser) return;
      if (!isListening && !isPlaying) return;
      
      const now = performance.now();
      const detectInterval = 33;
      
      if (now - lastDetectTime >= detectInterval) {
        lastDetectTime = now;
        
        const bufferLength = analyser.fftSize;
        const buffer = new Float32Array(bufferLength);
        analyser.getFloatTimeDomainData(buffer);
        
        const result = yinDetect(buffer, audioContext.sampleRate);
        
        if (result.freq > 50 && result.freq < 2000 && result.probability > 0.5) {
          let rawCents = 1200 * Math.log2(result.freq / config.refFreq);
          
          const baseAlpha = 0.03 + (config.responsiveness / 10) * 0.25;
          const smoothingFactor = 16 / (config.smoothing + 1);
          const alpha = Math.max(0.005, baseAlpha * Math.min(1, smoothingFactor));
          
          if (smoothedFreq === null) {
            smoothedFreq = result.freq;
            smoothedCents = rawCents;
          } else {
            smoothedFreq += (result.freq - smoothedFreq) * alpha;
            smoothedCents += (rawCents - smoothedCents) * alpha;
          }
          
          currentProbability = result.probability;
          lastPitchTime = now;
          lastValidPitch = { freq: smoothedFreq, cents: smoothedCents, probability: result.probability };
        }
      }
      
      if (fileMode && isPlaying && audioBuffer) {
        const currentTime = audioContext.currentTime - startTime;
        const duration = audioBuffer.duration;
        updateTimeDisplay(currentTime, duration);
        document.getElementById('seekBar').value = (currentTime / duration) * 100;
        
        if (currentTime >= duration) stopFilePlayback();
      }
      
      draw();
      animationId = requestAnimationFrame(audioLoop);
    }
    
    async function handleFileUpload(file) {
      if (!file) return;
      
      if (isListening) await toggleListening();
      if (isPlaying) stopFilePlayback();
      
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      
      try {
        const arrayBuffer = await file.arrayBuffer();
        audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
        
        fileMode = true;
        document.getElementById('playbackControls').style.display = 'block';
        document.getElementById('micBtn').style.display = 'none';
        
        updateTimeDisplay(0, audioBuffer.duration);
      } catch (err) {
        console.error('Error loading audio file:', err);
        alert('Could not load audio file.');
      }
    }
    
    function startFilePlayback() {
      if (!audioBuffer || !audioContext) return;
      
      if (audioContext.state === 'suspended') audioContext.resume();
      
      sourceNode = audioContext.createBufferSource();
      sourceNode.buffer = audioBuffer;
      sourceNode.onended = () => { if (isPlaying) stopFilePlayback(); };
      
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 4096;
      
      sourceNode.connect(analyser);
      analyser.connect(audioContext.destination);
      
      const offset = pauseTime;
      sourceNode.start(0, offset);
      startTime = audioContext.currentTime - offset;
      
      isPlaying = true;
      document.getElementById('playPauseBtn').textContent = 'Pause';
      
      smoothedFreq = null;
      smoothedCents = null;
      ghostTrail = [];
      lastDetectTime = 0;
      
      audioLoop();
    }
    
    function stopFilePlayback() {
      if (sourceNode) {
        sourceNode.stop();
        sourceNode.disconnect();
        sourceNode = null;
      }
      
      if (isPlaying) pauseTime = audioContext.currentTime - startTime;
      
      isPlaying = false;
      document.getElementById('playPauseBtn').textContent = 'Play';
      
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
    }
    
    function toggleFilePlayback() {
      isPlaying ? stopFilePlayback() : startFilePlayback();
    }
    
    function seekTo(percent) {
      if (!audioBuffer) return;
      
      const wasPlaying = isPlaying;
      if (isPlaying) stopFilePlayback();
      
      pauseTime = (percent / 100) * audioBuffer.duration;
      updateTimeDisplay(pauseTime, audioBuffer.duration);
      
      smoothedFreq = null;
      smoothedCents = null;
      ghostTrail = [];
      draw();
      
      if (wasPlaying) startFilePlayback();
    }
    
    function updateTimeDisplay(current, total) {
      const formatTime = (t) => {
        const mins = Math.floor(t / 60);
        const secs = Math.floor(t % 60);
        return `${mins}:${secs.toString().padStart(2, '0')}`;
      };
      document.getElementById('timeDisplay').textContent = `${formatTime(current)} / ${formatTime(total)}`;
    }
    
    function clearFile() {
      if (isPlaying) stopFilePlayback();
      
      audioBuffer = null;
      sourceNode = null;
      pauseTime = 0;
      fileMode = false;
      
      document.getElementById('playbackControls').style.display = 'none';
      document.getElementById('micBtn').style.display = 'flex';
      document.getElementById('audioFile').value = '';

    async function toggleListening() {
      const btn = document.getElementById('micBtn');

      if (!isListening) {
        try {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: {
              echoCancellation: false,
              noiseSuppression: false,
              autoGainControl: false
            }
          });
          currentAudioStream = stream;
          const source = audioContext.createMediaStreamSource(stream);
          analyser = audioContext.createAnalyser();
          analyser.fftSize = 4096;
          source.connect(analyser);

          isListening = true;
          btn.innerHTML = 'Listening';
          btn.classList.add('listening');
          lastDetectTime = 0;
          audioLoop();
        } catch (err) {
          console.error('Microphone error:', err);
          alert('Could not access microphone.');
        }
      } else {
        isListening = false;
        if (animationId) cancelAnimationFrame(animationId);
        if (currentAudioStream) {
          currentAudioStream.getTracks().forEach(t => t.stop());
          currentAudioStream = null;
        }
        if (audioContext) audioContext.close();
        audioContext = null;
        analyser = null;
        smoothedFreq = null;
        smoothedCents = null;
        lastPitchTime = 0;

        btn.innerHTML = 'Microphone';
        btn.classList.remove('listening');

        fadeOutIndicator();
      }
    }

    async function setupCamera(facingMode) {
      if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
      }
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: facingMode },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        });
        cameraFacing = facingMode;
        const video = document.getElementById('cameraFeed');
        video.srcObject = cameraStream;
        await video.play().catch(() => {});
        return true;
      } catch (err) {
        console.error('Camera error:', err);
        alert('Could not access camera.');
        return false;
      }
    }

    async function flipCamera() {
      const next = cameraFacing === 'user' ? 'environment' : 'user';
      // If recording, swap track without breaking the recorder
      const wasRecording = mediaRecorder && mediaRecorder.state === 'recording';
      const ok = await setupCamera(next);
      if (!ok) {
        // fall back
        await setupCamera(cameraFacing);
      }
    }

    async function enterRecordMode() {
      if (recordMode) return;

      if (!isListening) {
        await toggleListening();
        if (!isListening) return; // mic permission failed
      }

      const ok = await setupCamera(cameraFacing);
      if (!ok) return;

      recordMode = true;
      document.body.classList.add('record-mode');
      // Force canvas to repaint at new dimensions on next frame
      const canvas = document.getElementById('rulerCanvas');
      canvas.width = 0;
      // Kick the render loop in case mic is on but loop got stale
      if (!animationId && isListening) audioLoop();
    }

    function exitRecordMode() {
      if (!recordMode) return;
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        stopRecording();
      }
      recordMode = false;
      document.body.classList.remove('record-mode');
      if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
      }
      const video = document.getElementById('cameraFeed');
      video.srcObject = null;
      // Force canvas to repaint at normal dimensions
      const canvas = document.getElementById('rulerCanvas');
      canvas.width = 0;
      draw();
    }

    function pickRecorderMime() {
      const candidates = [
        'video/mp4;codecs=avc1,mp4a',
        'video/mp4',
        'video/webm;codecs=vp9,opus',
        'video/webm;codecs=vp8,opus',
        'video/webm'
      ];
      for (const m of candidates) {
        if (window.MediaRecorder && MediaRecorder.isTypeSupported(m)) return m;
      }
      return '';
    }

    function startRecording() {
      if (!recordMode) return;
      if (mediaRecorder && mediaRecorder.state === 'recording') return;
      if (!currentAudioStream) {
        alert('Microphone not active.');
        return;
      }

      const canvas = document.getElementById('rulerCanvas');
      const canvasStream = canvas.captureStream(30);
      const audioTrack = currentAudioStream.getAudioTracks()[0];
      if (audioTrack) {
        canvasStream.addTrack(audioTrack);
      }

      const mime = pickRecorderMime();
      recordedChunks = [];
      try {
        mediaRecorder = mime
          ? new MediaRecorder(canvasStream, { mimeType: mime, videoBitsPerSecond: 8_000_000 })
          : new MediaRecorder(canvasStream, { videoBitsPerSecond: 8_000_000 });
      } catch (err) {
        console.error('MediaRecorder init failed:', err);
        alert('Recording is not supported on this browser.');
        return;
      }

      mediaRecorder.ondataavailable = (e) => {
        if (e.data && e.data.size > 0) recordedChunks.push(e.data);
      };
      mediaRecorder.onstop = () => {
        const type = mediaRecorder.mimeType || mime || 'video/webm';
        const ext = type.includes('mp4') ? 'mp4' : 'webm';
        const blob = new Blob(recordedChunks, { type });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
        a.download = `harmony-${ts}.${ext}`;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => {
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }, 100);

        // Stop only the canvas video track; keep the shared mic track alive
        canvasStream.getVideoTracks().forEach(t => t.stop());
        recordedChunks = [];
      };

      mediaRecorder.start(1000);
      recordStartTime = performance.now();
      document.getElementById('recBtn').classList.add('recording');
      const ind = document.getElementById('recIndicator');
      ind.classList.add('visible');
      const tick = () => {
        if (!mediaRecorder || mediaRecorder.state !== 'recording') return;
        const sec = Math.floor((performance.now() - recordStartTime) / 1000);
        const m = Math.floor(sec / 60);
        const s = (sec % 60).toString().padStart(2, '0');
        document.getElementById('recTime').textContent = `${m}:${s}`;
        recordTimerId = setTimeout(tick, 250);
      };
      tick();
    }

    function stopRecording() {
      if (!mediaRecorder || mediaRecorder.state !== 'recording') return;
      mediaRecorder.stop();
      document.getElementById('recBtn').classList.remove('recording');
      document.getElementById('recIndicator').classList.remove('visible');
      if (recordTimerId) {
        clearTimeout(recordTimerId);
        recordTimerId = null;
      }
    }

    function toggleRecording() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        stopRecording();
      } else {
        startRecording();
      }
    }

    function setupTitleLongPress() {
      const title = document.getElementById('title');
      let pressTimer = null;
      let triggered = false;

      const start = (e) => {
        triggered = false;
        clearTimeout(pressTimer);
        pressTimer = setTimeout(() => {
          triggered = true;
          if (navigator.vibrate) navigator.vibrate(30);
          if (recordMode) exitRecordMode();
          else enterRecordMode();
        }, 700);
      };
      const cancel = () => {
        clearTimeout(pressTimer);
        pressTimer = null;
      };

      title.addEventListener('pointerdown', start);
      title.addEventListener('pointerup', cancel);
      title.addEventListener('pointerleave', cancel);
      title.addEventListener('pointercancel', cancel);

      // Suppress the regular click handler when long-press triggered
      title.addEventListener('click', (e) => {
        if (triggered) {
          e.stopImmediatePropagation();
          e.preventDefault();
          triggered = false;
        }
      }, true);
    }

    function handleFreqChange() {
      document.getElementById('refPreset').value = '';
      const freq = parseFloat(document.getElementById('refFreq').value);
      if (freq > 0) {
        const semitonesFromA4 = 12 * Math.log2(freq / 440);
        const nearestSemitone = Math.round(semitonesFromA4);
        const noteIndex = ((nearestSemitone % 12) + 12 + 9) % 12;
        const octave = 4 + Math.floor((nearestSemitone + 9) / 12);
        const noteNames = ['C', 'C♯', 'D', 'D♯', 'E', 'F', 'F♯', 'G', 'G♯', 'A', 'A♯', 'B'];
        config.refNote = noteNames[noteIndex] + octave;
      }
      updateConfig();
    }

      document.getElementById('octaveWrap').addEventListener('change', updateConfig);
      document.getElementById('show12EDO').addEventListener('change', updateConfig);
      document.getElementById('edoOffset').addEventListener('input', updateConfig);
      document.getElementById('rulerPosition').addEventListener('input', updateConfig);
      document.getElementById('smoothing').addEventListener('input', updateConfig);
      document.getElementById('responsiveness').addEventListener('input', updateConfig);
      document.getElementById('showIndicatorHz').addEventListener('change', updateConfig);
      document.getElementById('showIndicatorDeviation').addEventListener('change', updateConfig);
      document.getElementById('showIndicatorRatio').addEventListener('change', updateConfig);
      
      document.getElementById('rulerCanvas').addEventListener('click', handleCanvasClick);
      document.getElementById('stopDronesBtn').addEventListener('click', stopAllDrones);

      setupTitleLongPress();
      document.getElementById('recBtn').addEventListener('click', toggleRecording);
      document.getElementById('flipCamBtn').addEventListener('click', flipCamera);
      document.getElementById('exitRecBtn').addEventListener('click', exitRecordMode);
      document.getElementById('featherSlider').addEventListener('input', (e) => {
        featherAmount = parseInt(e.target.value, 10) / 100;
      });
      
      document.getElementById('saveBtn').addEventListener('click', saveSession);
      document.getElementById('resetBtn').addEventListener('click', resetToDefaults);
      
      document.getElementById('audioFile').addEventListener('change', (e) => {
        if (e.target.files[0]) handleFileUpload(e.target.files[0]);
      });
      
      document.getElementById('playPauseBtn').addEventListener('click', toggleFilePlayback);
      document.getElementById('seekBar').addEventListener('input', (e) => seekTo(parseFloat(e.target.value)));
      document.getElementById('clearFileBtn').addEventListener('click', clearFile);
      
      window.addEventListener('resize', () => {
        const canvas = document.getElementById('rulerCanvas');
        canvas.width = 0;
        draw();
      });
      
      let saveTimeout;
      const autoSaveTriggers = ['ratios', 'refFreq', 'showCents', 'showHz', 'showGhost', 'octaveWrap', 'show12EDO', 'edoOffset', 'rulerPosition', 'smoothing', 'responsiveness', 'showIndicatorHz', 'showIndicatorDeviation', 'showIndicatorRatio'];
      autoSaveTriggers.forEach(id => {
        document.getElementById(id).addEventListener('change', () => {
          clearTimeout(saveTimeout);
          saveTimeout = setTimeout(saveSession, 500);
        });
      });
      
      updateConfig();
    }
    
    init();
  </script>
</body>
</html>
